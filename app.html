<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Key Finder</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0c0d11">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Key Finder">
<link rel="apple-touch-icon" href="apple-touch-icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Saira:wght@300;400;500;600;700&family=Saira+Semi+Condensed:wght@400;500;600;700&display=swap');
  :root{
    color-scheme: light;
    --font-display:'Saira','Saira Semi Condensed',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    --font-ui:'Saira Semi Condensed','Saira',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:#000;-webkit-font-smoothing:antialiased}
  input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:3px;background:#23262c;outline:none;width:100%}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:currentColor;cursor:pointer;border:none}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:currentColor;cursor:pointer;border:none}
  input[type=color]{-webkit-appearance:none;appearance:none}
  input[type=color]::-webkit-color-swatch-wrapper{padding:0}
  input[type=color]::-webkit-color-swatch{border:none;border-radius:5px}
  aside::-webkit-scrollbar{width:8px}
  aside::-webkit-scrollbar-thumb{background:#1d2026;border-radius:4px}
</style>
</head>
<body>
<div id="page" style="min-height:100vh;display:flex;align-items:stretch;font-family:var(--font-ui),system-ui,sans-serif;">
  <aside id="aside"></aside>
  <main id="main" style="flex:1;min-width:0;padding:36px 32px 90px 22px;"></main>
</div>

<script>
"use strict";
(function(){
  function k2(s){return s.replace(/[A-Z]/g,m=>'-'+m.toLowerCase());}
  function css(o){return Object.keys(o).map(k=>k2(k)+':'+o[k]).join(';');}
  function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}

  class App {
    NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    FLAT = {1:'Db',3:'Eb',6:'Gb',8:'Ab',10:'Bb'};
    BLACK = [1,3,6,8,10];
    INTERVALS = { major:[0,2,4,5,7,9,11], minor:[0,2,3,5,7,8,10] };
    ROMAN = ['I','II','III','IV','V','VI','VII'];
    PROGS = {
      major: [
        { name:'Pop / Axis',      degrees:[0,4,5,3] },
        { name:'Classic Cadence', degrees:[0,3,4] },
        { name:'Jazz Turnaround', degrees:[1,4,0] },
        { name:'50s Doo-Wop',     degrees:[0,5,3,4] },
      ],
      minor: [
        { name:'Minor Cadence',     degrees:[0,3,4] },
        { name:'Epic / Andalusian', degrees:[0,5,2,6] },
        { name:'Folk Loop',         degrees:[0,3,6] },
        { name:'Minor Turnaround',  degrees:[1,4,0] },
      ],
    };
    SECTIONS = [
      {title:'Colors', rows:[
        {kind:'color', label:'Scale notes',   key:'scaleColor',   sw:['#43E08A','#33D6FF','#7C8CFF','#FF6FB5','#FFFFFF']},
        {kind:'color', label:'Chord notes',   key:'chordColor',   sw:['#FFD23F','#FF8A3D','#FF5470','#C9A227','#E8E8E8']},
        {kind:'color', label:'Seventh notes', key:'seventhColor', sw:['#B98CFF','#39C7E0','#FF7A45','#5BE5C4','#E8E8E8']},
        {kind:'color', label:'Background',    key:'background',   sw:['#14161B','#000000','#1A1410','#0D1A17','#101622']},
      ]},
      {title:'Piano', rows:[
        {kind:'seg',   label:'Corners',  key:'cornerStyle', options:['Rounded','Sharp']},
        {kind:'range', label:'Glow',     key:'glow',     min:0.3, max:1.8, step:0.1, unit:'×'},
        {kind:'range', label:'Key size', key:'pianoSize',min:0.85,max:2.5, step:0.05,unit:'×'},
        {kind:'range', label:'Multi-view size', key:'multiSize', min:0.6, max:2, step:0.1, unit:'×'},
        {kind:'range', label:'Live piano size', key:'liveSize', min:1, max:3, step:0.25, unit:'×'},
        {kind:'seg',   label:'Note labels', key:'labelMode', options:['Sharps','Flats','Smart']},
      ]},
      {title:'Chords', rows:[
        {kind:'seg',    label:'Chord type', key:'chordType', options:['Triads','Sevenths']},
        {kind:'toggle', label:'Roman numerals', key:'showNumerals'},
        {kind:'toggle', label:'Scale glow in chords', key:'scaleInChord'},
      ]},
      {title:'Sound', rows:[
        {kind:'seg',   label:'Waveform', key:'waveform', options:['Triangle','Sine','Square','Sawtooth']},
        {kind:'range', label:'Volume',  key:'volume', min:0,   max:100, step:1,  unit:'%'},
        {kind:'range', label:'Tone',    key:'brightness', min:600, max:6000, step:100, unit:'Hz'},
        {kind:'range', label:'Sustain', key:'sustain', min:0.4, max:2.5, step:0.1, unit:'s'},
      ]},
      {title:'Listener', rows:[
        {kind:'toggle', label:'Harmonic cleanup', key:'harmonicClean'},
        {kind:'toggle', label:'Auto-follow top key (Live)', key:'autoApply'},
      ]},
      {title:'Playback', rows:[
        {kind:'range', label:'Tempo', key:'tempo', min:40, max:180, step:1, unit:'BPM'},
        {kind:'toggle', label:'Arpeggiate', key:'arpeggiate'},
        {kind:'toggle', label:'Loop', key:'loop'},
      ]},
    ];

    constructor(){
      this.state = {
        root:0, scale:'major', chord:null, prog:null, playing:false, flash:{}, d1:true, d2:false, sideOpen:true, view:'single', liveRight:'keys',
        cfg: {
          scaleColor:'#43E08A', chordColor:'#FFD23F', seventhColor:'#B98CFF', background:'#14161B',
          cornerStyle:'Rounded', glow:1, pianoSize:1.8, multiSize:1, liveSize:1, labelMode:'Sharps',
          chordType:'Triads', showNumerals:true, scaleInChord:true,
          waveform:'Triangle', volume:55, brightness:2600, sustain:1.1, harmonicClean:true, autoApply:false,
          tempo:67, arpeggiate:false, loop:true,
        },
      };
      this.pageEl = document.getElementById('page');
      this.asideEl = document.getElementById('aside');
      this.mainEl = document.getElementById('main');
      this._syncers = [];
      this.acc = new Array(12).fill(0);
      this.live = new Array(12).fill(0);
      this.cands = [];
      this.listening = false;
      this.micError = null;
      this.loadState();
      this.buildSidebar();
      this.mainEl.addEventListener('click', e => {
        const t = e.target.closest('[data-act]'); if(!t) return;
        const a = t.dataset;
        switch(a.act){
          case 'root':  this.setRoot(+a.pc); break;
          case 'scale': this.setScale(a.val); break;
          case 'key':   this.tapKey(+a.pc); break;
          case 'chord': this.pickChord(+a.deg); break;
          case 'prog':  this.pickProg(+a.i); break;
          case 'step':  this.pickStep(+a.deg); break;
          case 'play':  this.togglePlay(); break;
          case 'view':  if(a.val!=='listen' && a.val!=='live' && this.listening) this.stopListen(); this.setState({view:a.val}); break;
          case 'liveright': this.setState({liveRight:a.val}); break;
          case 'playchord': this.pickStep(+a.deg); break;
          case 'listen_start': this.startListen(); break;
          case 'listen_stop':  this.stopListen(); break;
          case 'listen_shortcut': if(this.listening){ this.stopListen(); } else { this.setState({view:'live'}); this.startListen(); } break;
          case 'listen_reset': this.acc=new Array(12).fill(0); this.live=new Array(12).fill(0); this.cands=[]; this.micError=null; this.render(); break;
          case 'applykey': this.applyKey(+a.root, a.scale); break;
          case 'd1':    this.setState(s=>({d1:!s.d1})); break;
          case 'd2':    this.setState(s=>({d2:!s.d2})); break;
        }
      });
      this.render();
      this.addCredit();
    }

    addCredit(){
      const c=document.createElement('div');
      c.innerHTML='Made with <span style="color:#ff6f9d;">&#9829;</span> by <a href="https://x.com/KyleKesterson" target="_blank" rel="noopener" style="color:#9aa0aa;text-decoration:none;border-bottom:1px solid #2a2e39;">@KyleKesterson</a>';
      Object.assign(c.style,{ position:'fixed', right:'14px', bottom:'10px', zIndex:'50',
        fontFamily:'var(--font-ui),system-ui,sans-serif', fontSize:'11px', letterSpacing:'.3px',
        color:'#565c6b', background:'rgba(8,9,11,0.6)', padding:'4px 9px', borderRadius:'8px',
        backdropFilter:'blur(4px)', pointerEvents:'auto' });
      document.body.appendChild(c);
    }

    setState(u){
      const patch = typeof u === 'function' ? u(this.state) : u;
      Object.assign(this.state, patch);
      this.persist();
      this.render();
    }
    P(name, def){ const v = this.state.cfg[name]; return v==null ? def : v; }
    setCfg(key, val){ this.state.cfg[key] = val; this.persist(); this.render(); }
    loadState(){
      try{
        const raw=localStorage.getItem('keyfinder.v1');
        if(!raw) return;
        const s=JSON.parse(raw);
        if(s.cfg && typeof s.cfg==='object') Object.assign(this.state.cfg, s.cfg);
        if(typeof s.root==='number') this.state.root=s.root;
        if(s.scale==='major'||s.scale==='minor') this.state.scale=s.scale;
        if(typeof s.sideOpen==='boolean') this.state.sideOpen=s.sideOpen;
        if(typeof s.d1==='boolean') this.state.d1=s.d1;
        if(typeof s.d2==='boolean') this.state.d2=s.d2;
        let v=s.view; if(v==='listen'||v==='live') v='single';
        if(v) this.state.view=v;
      }catch(e){}
    }
    persist(){
      try{
        const s=this.state;
        localStorage.setItem('keyfinder.v1', JSON.stringify({ cfg:s.cfg, root:s.root, scale:s.scale, view:s.view, sideOpen:s.sideOpen, d1:s.d1, d2:s.d2 }));
      }catch(e){}
    }

    /* ---------- music theory ---------- */
    scalePcs(){ return this.INTERVALS[this.state.scale].map(i => (this.state.root + i) % 12); }
    triad(deg){ const s=this.scalePcs(); return [ s[deg%7], s[(deg+2)%7], s[(deg+4)%7] ]; }
    seventhPc(deg){ const s=this.scalePcs(); return s[(deg+6)%7]; }
    isSeventh(){ return this.P('chordType','Triads')==='Sevenths'; }
    chordTones(deg){ const t=this.triad(deg); return this.isSeventh()? t.concat(this.seventhPc(deg)) : t; }
    quality(deg){
      const t=this.triad(deg);
      const a=(t[1]-t[0]+12)%12, b=(t[2]-t[0]+12)%12;
      if(a===4&&b===7) return 'maj';
      if(a===3&&b===7) return 'min';
      if(a===3&&b===6) return 'dim';
      if(a===4&&b===8) return 'aug';
      return 'maj';
    }
    numeral(deg){
      const q=this.quality(deg); let r=this.ROMAN[deg];
      if(q==='min'||q==='dim') r=r.toLowerCase();
      if(q==='dim') r+='°';
      if(this.isSeventh()) r+='7';
      return r;
    }
    noteName(pc){
      const mode=this.P('labelMode','Sharps');
      if(mode==='Flats') return this.FLAT[pc]||this.NAMES[pc];
      if(mode==='Smart'){
        const flatRoots=[5,10,3,8,1];
        if(this.state.scale==='minor'||flatRoots.includes(this.state.root)) return this.FLAT[pc]||this.NAMES[pc];
      }
      return this.NAMES[pc];
    }
    chordName(deg){
      const t=this.triad(deg), q=this.quality(deg);
      let suf = q==='maj'?'':q==='min'?'m':q==='dim'?'dim':'aug';
      if(this.isSeventh()){
        const sev=(this.seventhPc(deg)-t[0]+12)%12;
        if(q==='maj') suf = sev===11?'maj7':'7';
        else if(q==='min') suf='m7';
        else if(q==='dim') suf = sev===9?'dim7':'m7♭5';
        else suf='7';
      }
      return this.noteName(t[0])+suf;
    }
    progs(){ return this.PROGS[this.state.scale]; }
    beatMs(){ return Math.round(60000 / this.P('tempo',67)); }

    hexToRgb(hex){
      const h=(hex||'').replace('#','');
      const n=h.length===3? h.split('').map(c=>c+c).join('') : h;
      const num=parseInt(n,16);
      if(isNaN(num)) return '67,224,138';
      return ((num>>16)&255)+','+((num>>8)&255)+','+(num&255);
    }
    mix(rgbStr,a,base){
      const p=rgbStr.split(',').map(Number);
      const b=base||[10,11,15];
      const r=Math.round(p[0]*a+b[0]*(1-a));
      const g=Math.round(p[1]*a+b[1]*(1-a));
      const bl=Math.round(p[2]*a+b[2]*(1-a));
      return 'rgb('+r+','+g+','+bl+')';
    }

    /* ---------- audio ---------- */
    ensureAudio(){
      if(!this.ctx){
        const AC=window.AudioContext||window.webkitAudioContext;
        this.ctx=new AC();
        this.master=this.ctx.createGain();
        this.master.connect(this.ctx.destination);
      }
      this.master.gain.value=this.P('volume',55)/100;
      if(this.ctx.state==='suspended') this.ctx.resume();
    }
    freq(midi){ return 440*Math.pow(2,(midi-69)/12); }
    playMidi(midi,when,dur,vel){
      const ctx=this.ctx;
      const t=when==null?ctx.currentTime:when;
      const d=dur==null?this.P('sustain',1.1):dur;
      const v=vel==null?0.5:vel;
      const wave={Triangle:'triangle',Sine:'sine',Square:'square',Sawtooth:'sawtooth'}[this.P('waveform','Triangle')]||'triangle';
      const filt=ctx.createBiquadFilter();
      filt.type='lowpass'; filt.frequency.value=this.P('brightness',2600); filt.Q.value=0.6;
      const g=ctx.createGain();
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(v,t+0.014);
      g.gain.exponentialRampToValueAtTime(0.0001,t+d);
      const f=this.freq(midi);
      const o1=ctx.createOscillator(); o1.type=wave; o1.frequency.value=f;
      const o2=ctx.createOscillator(); o2.type='sine'; o2.frequency.value=f; o2.detune.value=7;
      o1.connect(filt); o2.connect(filt); filt.connect(g); g.connect(this.master);
      o1.start(t); o2.start(t); o1.stop(t+d+0.05); o2.stop(t+d+0.05);
    }
    voicing(pcs){
      const out=[]; let prev=-Infinity;
      pcs.forEach((pc,i)=>{ let m=60+pc; if(i>0){ while(m<=prev) m+=12; } prev=m; out.push(m); });
      return out;
    }
    playChordDegree(deg){
      this.ensureAudio();
      const notes=this.voicing(this.chordTones(deg));
      const arp=!!this.state.cfg.arpeggiate;
      const t0=this.ctx.currentTime;
      notes.forEach((m,i)=>this.playMidi(m, arp? t0+i*0.08 : undefined, undefined, 0.3));
    }
    playNotePc(pc){ this.ensureAudio(); this.playMidi(60+pc, undefined, undefined, 0.5); }

    /* ---------- flashing ---------- */
    flashPc(pc){
      this.setState(s=>({flash:{...s.flash,[pc]:true}}));
      setTimeout(()=>this.setState(s=>{ const f={...s.flash}; delete f[pc]; return {flash:f}; }),210);
    }
    flashChord(deg){ this.chordTones(deg).forEach(pc=>this.flashPc(pc)); }

    /* ---------- interactions ---------- */
    tapKey(pc){ this.playNotePc(pc); this.flashPc(pc); }
    setRoot(pc){ this.stopProg(); this.setState({root:pc}); }
    setScale(sc){ if(sc===this.state.scale) return; this.stopProg(); this.setState({scale:sc, prog:null}); }
    pickChord(deg){
      this.stopProg();
      const sel=this.state.chord!==deg;
      this.setState({chord: sel?deg:null});
      if(sel){ this.flashChord(deg); this.playChordDegree(deg); }
    }
    pickProg(i){
      this.stopProg();
      const sel=this.state.prog!==i;
      if(sel){
        const d=this.progs()[i].degrees[0];
        this.setState({prog:i, chord:d});
        this.flashChord(d); this.playChordDegree(d);
      } else { this.setState({prog:null}); }
    }
    pickStep(deg){ this.stopProg(); this.setState({chord:deg}); this.flashChord(deg); this.playChordDegree(deg); }
    togglePlay(){ if(this.state.playing) this.stopProg(); else this.startProg(); }
    startProg(){
      if(this.state.prog==null) return;
      this.ensureAudio();
      this._step=0;
      this.setState({playing:true});
      this.advance();
    }
    advance(){
      const prog=this.progs()[this.state.prog];
      if(!prog){ this.stopProg(); return; }
      const deg=prog.degrees[this._step % prog.degrees.length];
      this.setState({chord:deg});
      this.flashChord(deg);
      this.playChordDegree(deg);
      this._step++;
      if(!this.P('loop',true) && this._step>=prog.degrees.length){ this._timer=setTimeout(()=>this.stopProg(), this.beatMs()); return; }
      this._timer=setTimeout(()=>this.advance(), this.beatMs());
    }
    stopProg(){
      if(this._timer){ clearTimeout(this._timer); this._timer=null; }
      if(this.state.playing) this.setState({playing:false});
    }

    /* ---------- listener (mic -> chromagram -> key) ---------- */
    async startListen(){
      if(this.listening) return;
      this.micError=null;
      try{
        if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia)) throw {name:'Unsupported'};
        const stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
        this.ensureAudio();
        this.micStream=stream;
        this.micSrc=this.ctx.createMediaStreamSource(stream);
        this.analyser=this.ctx.createAnalyser();
        this.analyser.fftSize=8192;
        this.analyser.smoothingTimeConstant=0.5;
        this.micSrc.connect(this.analyser); // not connected to destination -> no feedback
        this.freqData=new Float32Array(this.analyser.frequencyBinCount);
        this.listening=true;
        this._listenTimer=setInterval(()=>this.analyseFrame(),130);
        this.render();
      }catch(e){
        const n=e&&e.name;
        this.micError = n==='NotAllowedError'||n==='SecurityError' ? 'Mic blocked. Click the mic/lock icon in your browser’s address bar, set Microphone to Allow, then reload. This embedded preview can stay blocked — the live site is most reliable.'
          : n==='NotFoundError'||n==='DevicesNotFoundError' ? 'No microphone found. Connect or enable a mic and try again.'
          : n==='Unsupported' ? 'Microphone not available here. Open the live site (https) to use the listener.'
          : 'Could not start the microphone ('+(n||'error')+').';
        this.listening=false;
        this.render();
      }
    }
    stopListen(){
      if(this._listenTimer){ clearInterval(this._listenTimer); this._listenTimer=null; }
      if(this.micStream){ this.micStream.getTracks().forEach(t=>t.stop()); this.micStream=null; }
      if(this.micSrc){ try{this.micSrc.disconnect();}catch(_){} this.micSrc=null; }
      this.analyser=null;
      if(this.listening){ this.listening=false; this.render(); }
    }
    analyseFrame(){
      if(!this.analyser) return;
      this.analyser.getFloatFrequencyData(this.freqData);
      const binHz=this.ctx.sampleRate/this.analyser.fftSize;
      const minBin=Math.max(1,Math.floor(65/binHz));            // ~C2
      const maxBin=Math.min(this.freqData.length-1,Math.ceil(2093/binHz)); // ~C7
      let mx=-Infinity;
      for(let i=minBin;i<=maxBin;i++){ if(this.freqData[i]>mx) mx=this.freqData[i]; }
      const frame=new Array(12).fill(0);
      let any=false;
      if(mx>-90){
        const floor=mx-30;
        for(let i=minBin;i<=maxBin;i++){
          const db=this.freqData[i];
          if(db<floor) continue;
          const f=i*binHz;
          const mag=Math.pow(10, db/20);
          const midi=69+12*Math.log2(f/440);
          const pc=((Math.round(midi)%12)+12)%12;
          frame[pc]+=mag; any=true;
        }
      }
      const sum=frame.reduce((a,b)=>a+b,0);
      if(sum>0) for(let p=0;p<12;p++) frame[p]/=sum;
      if(this.P('harmonicClean',true) && sum>0){
        const sup=this.suppressHarmonics(frame);
        let s2=0; for(let p=0;p<12;p++) s2+=sup[p];
        if(s2>0) for(let p=0;p<12;p++) frame[p]=sup[p]/s2;
      }
      for(let p=0;p<12;p++) this.live[p]=this.live[p]*0.6+frame[p]*0.4;
      if(any && sum>0){ for(let p=0;p<12;p++) this.acc[p]+=frame[p]; }
      this.cands=this.detectKeys(this.acc);
      if(this.state.view==='live' && this.P('autoApply',false) && this.cands.length){
        const top=this.cands[0];
        if(this._autoLast && this._autoLast.root===top.root && this._autoLast.scale===top.scale) this._autoCount=(this._autoCount||0)+1;
        else this._autoCount=0;
        this._autoLast=top;
        if(this._autoCount>=3 && (top.root!==this.state.root || top.scale!==this.state.scale)){
          this._autoCount=0;
          this.setState({root:top.root, scale:top.scale, chord:null});
          return;
        }
      }
      this.updateListen();
    }
    listenViz(){
      const live=this.live||new Array(12).fill(0);
      const maxLive=Math.max.apply(null, live);
      const hasSignal=maxLive>0.02;
      let maxPc=0; for(let i=1;i<12;i++){ if(live[i]>live[maxPc]) maxPc=i; }
      const G=this.hexToRgb(this.state.cfg.scaleColor);
      const barH=this._listenBarH||130, out=[];
      for(let pc=0;pc<12;pc++){
        const ratio = maxLive>0 ? live[pc]/maxLive : 0;
        const h=Math.max(2, Math.round(ratio*barH));
        let bg, lc;
        if(hasSignal && pc===maxPc){ bg='linear-gradient(180deg,rgba('+G+',0.95),rgba('+G+',0.2))'; lc='#cfeede'; }
        else if(hasSignal && ratio>=0.12){ bg='linear-gradient(180deg,#525863,#262b32)'; lc='#aab0bb'; }
        else { bg='#161920'; lc=this.BLACK.includes(pc)?'#4a505c':'#6b7079'; }
        out.push({h,bg,lc});
      }
      return {bars:out, barH, maxPc, hasSignal};
    }
    listenCandData(){
      const cands=this.cands||[];
      if(!cands.length) return [];
      const top=Math.max(0.0001, cands[0].score);
      return cands.map((c,i)=>({
        root:c.root, scale:c.scale,
        label:this.noteName(c.root)+' '+(c.scale==='major'?'Major':'Minor'),
        pct:Math.max(4, Math.round(Math.max(0,c.score)/top*100)),
        best:i===0
      }));
    }
    listenStatusHtml(){
      const cfg=this.state.cfg;
      const supported=(typeof navigator!=='undefined' && navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
      if(this.micError) return '<span style="color:#ff9d7c;font-size:13px;line-height:1.4;">'+this.micError+'</span>';
      if(this.listening) return '<span style="color:'+cfg.scaleColor+';font-size:13px;">&#9679; Listening… keep it playing. Longer listening = more accurate.</span>';
      if(!supported) return '<span style="color:#ffb38a;font-size:13px;line-height:1.4;">Mic isn’t available in this preview. Open the live site (https) to use the listener.</span>';
      return '<span style="color:#6b717b;font-size:13px;">Point your device at the room, start, and let it listen.</span>';
    }
    updateListen(){
      if(this.state.view!=='listen' && this.state.view!=='live') return;
      const cfg=this.state.cfg, G=this.hexToRgb(cfg.scaleColor), Y=this.hexToRgb(cfg.chordColor);
      const viz=this.listenViz();
      for(let pc=0;pc<12;pc++){
        const bar=document.getElementById('kfbar-'+pc), lbl=document.getElementById('kflbl-'+pc);
        if(bar){ bar.style.height=viz.bars[pc].h+'px'; bar.style.background=viz.bars[pc].bg; }
        if(lbl){ lbl.style.color=viz.bars[pc].lc; }
      }
      const cd=this.listenCandData();
      const msg=document.getElementById('kfcandmsg'); if(msg) msg.style.display=cd.length?'none':'block';
      for(let i=0;i<3;i++){
        const btn=document.getElementById('kfcand-'+i); if(!btn) continue;
        const c=cd[i];
        if(!c){ btn.style.display='none'; continue; }
        const best=i===0;
        btn.style.display='flex';
        btn.dataset.root=c.root; btn.dataset.scale=c.scale;
        btn.style.border='1px solid '+(best?'rgba('+Y+',.7)':'#23262c');
        const name=document.getElementById('kfcandname-'+i);
        if(name){ name.textContent=c.label; name.style.color=best?cfg.chordColor:'#cfd2d8'; name.style.fontSize=(best?'18':'15')+'px'; }
        const tag=document.getElementById('kfcandtag-'+i); if(tag) tag.textContent=best?'Best · tap to use':'Tap to use';
        const cbar=document.getElementById('kfcandbar-'+i);
        if(cbar){ cbar.style.width=c.pct+'%'; cbar.style.background=best?'rgba('+Y+',.9)':'rgba('+G+',.6)'; }
      }
      const st=document.getElementById('kfstatus'); if(st) st.innerHTML=this.listenStatusHtml();
    }
    suppressHarmonics(ch){
      // a note's main false echoes land a perfect fifth above (3rd harmonic, +7)
      // and a major third above (5th harmonic, +4). Subtract a fraction of the
      // would-be fundamental sitting a fifth/third below each bar.
      const out=new Array(12);
      for(let q=0;q<12;q++){
        const fifthBelow=ch[(q-7+12)%12];
        const thirdBelow=ch[(q-4+12)%12];
        out[q]=Math.max(0, ch[q] - 0.45*fifthBelow - 0.25*thirdBelow);
      }
      return out;
    }
    detectKeys(acc){
      const total=acc.reduce((a,b)=>a+b,0);
      if(total<=0) return [];
      const MAJ=[6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
      const MIN=[6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
      const corr=(a,b)=>{
        let ma=0,mb=0; for(let i=0;i<12;i++){ma+=a[i];mb+=b[i];} ma/=12;mb/=12;
        let num=0,da=0,db=0;
        for(let i=0;i<12;i++){const x=a[i]-ma,y=b[i]-mb; num+=x*y; da+=x*x; db+=y*y;}
        return (da&&db)? num/Math.sqrt(da*db) : 0;
      };
      const out=[];
      for(let r=0;r<12;r++){
        const majP=[],minP=[];
        for(let i=0;i<12;i++){ majP[i]=MAJ[((i-r)%12+12)%12]; minP[i]=MIN[((i-r)%12+12)%12]; }
        out.push({root:r,scale:'major',score:corr(acc,majP)});
        out.push({root:r,scale:'minor',score:corr(acc,minP)});
      }
      out.sort((a,b)=>b.score-a.score);
      return out.slice(0,3);
    }
    applyKey(r,scale){
      if(this.state.view==='live'){ this.setState({root:r, scale:scale, chord:null, prog:null}); }
      else { this.stopListen(); this.setState({root:r, scale:scale, chord:null, prog:null, view:'single'}); }
    }

    /* ---------- sidebar (built once) ---------- */

    labelEl(text){
      const d=el('<div>'+text+'</div>');
      Object.assign(d.style,{fontSize:'10px',letterSpacing:'1.4px',textTransform:'uppercase',color:'#5f656e',marginBottom:'8px'});

    }

    buildRow(row){
      const cfg=this.state.cfg;
      if(row.kind==='color'){
        const box=el('<div></div>');
        box.appendChild(this.labelEl(row.label));
        const line=el('<div></div>');
        Object.assign(line.style,{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'});
        const swEls=[];
        row.sw.forEach(c=>{
          const b=el('<button type="button"></button>');
          Object.assign(b.style,{width:'22px',height:'22px',borderRadius:'6px',cursor:'pointer',padding:'0',background:c});
          b.addEventListener('click',()=>{ this.setCfg(row.key,c); picker.value=c; });
          line.appendChild(b); swEls.push({b,c});
        });
        const picker=el('<input type="color">');
        picker.value=cfg[row.key];
        Object.assign(picker.style,{width:'34px',height:'26px',padding:'0',border:'1px solid #2a2d34',borderRadius:'6px',background:'transparent',cursor:'pointer'});
        picker.addEventListener('input',()=>this.setCfg(row.key,picker.value));
        line.appendChild(picker);
        box.appendChild(line);
        this._syncers.push(()=>{
          const cur=(this.state.cfg[row.key]||'').toLowerCase();

      if(row.kind==='seg'){
        const box=el('<div></div>');

        const wrap=el('<div></div>');
        Object.assign(wrap.style,{display:'flex',flexWrap:'wrap',gap:'3px',padding:'3px',background:'#0e1014',border:'1px solid #1d2026',borderRadius:'8px'});
        const btns=[];
        row.options.forEach(opt=>{
          const b=el('<button type="button">'+opt+'</button>');
          Object.assign(b.style,{flex:'1 1 40%',minWidth:'0',padding:'7px 6px',fontFamily:'var(--font-ui),sans-serif',fontSize:'11px',fontWeight:'600',letterSpacing:'.3px',border:'none',borderRadius:'6px',cursor:'pointer',transition:'all .12s ease'});
          b.addEventListener('click',()=>this.setCfg(row.key,opt));
          wrap.appendChild(b); btns.push({b,opt});
        });
        box.appendChild(wrap);
        this._syncers.push(()=>{
          const cur=this.state.cfg[row.key];
          btns.forEach(o=>{ const a=o.opt===cur; o.b.style.background=a?'#2a2f37':'transparent'; o.b.style.color=a?'#fff':'#7c828c'; });
        });
        return box;
      }
      if(row.kind==='toggle'){
        const box=el('<div></div>');
        Object.assign(box.style,{display:'flex',alignItems:'center',justifyContent:'space-between'});
        const lab=el('<span>'+row.label+'</span>');
        Object.assign(lab.style,{fontSize:'10px',letterSpacing:'1.4px',textTransform:'uppercase',color:'#5f656e'});
        const track=el('<button type="button"></button>');
        Object.assign(track.style,{width:'40px',height:'23px',borderRadius:'12px',border:'none',padding:'0',position:'relative',cursor:'pointer',transition:'background .15s ease'});
        const knob=el('<span></span>');
        Object.assign(knob.style,{position:'absolute',top:'3px',width:'17px',height:'17px',borderRadius:'50%',background:'#fff',transition:'left .15s ease',boxShadow:'0 1px 2px rgba(0,0,0,.4)'});
        track.appendChild(knob);
        track.addEventListener('click',()=>this.setCfg(row.key,!this.state.cfg[row.key]));
        box.appendChild(lab); box.appendChild(track);
        this._syncers.push(()=>{
          const on=!!this.state.cfg[row.key];
          track.style.background=on?this.state.cfg.scaleColor:'#23262c';
          knob.style.left=on?'20px':'3px';
        });
        return box;
      }
      // range
      const box=el('<div></div>');
      const head=el('<div></div>');
      Object.assign(head.style,{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:'8px'});
      const lab=el('<span>'+row.label+'</span>');
      Object.assign(lab.style,{fontSize:'10px',letterSpacing:'1.4px',textTransform:'uppercase',color:'#5f656e'});
      const disp=el('<span></span>');
      Object.assign(disp.style,{fontSize:'11px',color:'#9aa0aa'});
      head.appendChild(lab); head.appendChild(disp);
      const input=el('<input type="range">');
      input.min=row.min; input.max=row.max; input.step=row.step; input.value=this.state.cfg[row.key];
      input.style.cursor='pointer';
      input.addEventListener('input',()=>this.setCfg(row.key, Number(input.value)));
      box.appendChild(head); box.appendChild(input);
      this._syncers.push(()=>{
        disp.textContent=this.state.cfg[row.key]+' '+row.unit;

      });

    }

    syncSidebar(){
      const open=this.state.sideOpen;
      Object.assign(this.asideEl.style,{
        width: open?'288px':'56px', flexShrink:'0', alignSelf:'stretch', background:'#08090b',
        borderRight:'1px solid #16181d', padding: open?'24px 22px 60px':'20px 8px',
        position:'sticky', top:'0', maxHeight:'100vh', overflowY:'auto', overflowX:'hidden',
        transition:'width .18s ease', display:'flex', flexDirection:'column', alignItems: open?'stretch':'center'
      });
      this._sideTitle.style.display = open?'inline':'none';
      this._collapseBtn.textContent = open?'‹':'›';
      this._sideInner.style.display = open?'flex':'none';
      this._syncers.forEach(fn=>fn());
    }

    /* ---------- main render ---------- */
    render(){ this.syncSidebar(); this.renderMain(); }

    renderMain(){
      const S=this.state, cfg=S.cfg, NAMES=this.NAMES, FLAT=this.FLAT;
      const G=this.hexToRgb(cfg.scaleColor), Y=this.hexToRgb(cfg.chordColor), V=this.hexToRgb(cfg.seventhColor);
      const gl=this.P('glow',1);
      const sharp=this.P('cornerStyle','Rounded')==='Sharp';
      const R=px=> sharp?'0px':px+'px';
      const k=this.P('pianoSize',1);
      const mz=this.P('multiSize',1);
      this._listenBarH = S.view==='live' ? 104 : 130;
      const showNum=cfg.showNumerals!==false;
      const nm=pc=>this.noteName(pc);
      const scalePcs=this.scalePcs();
      const chord=S.chord;
      const tri=chord!=null?this.chordTones(chord):[];
      const cRoot=chord!=null?tri[0]:null;
      const sevPc=(chord!=null&&this.isSeventh())?tri[3]:null;
      const inKey=pc=>scalePcs.includes(pc);
      const inChord=pc=>tri.includes(pc);
      const fl=pc=>!!S.flash[pc];
      const dimScale=chord!=null&&cfg.scaleInChord===false;

      // page bg
      this.pageEl.style.background='radial-gradient(125% 80% at 60% -10%, '+this.P('background','#14161B')+' 0%, #000 72%)';

      /* piano rendering (range-aware: chords read left-to-right ascending, extending octaves as needed) */
      const NATS=[0,2,4,5,7,9,11];
      const isW=pc=>NATS.includes(pc);
      const applyRole=(o,role,black)=>{
        if(role==='root'||role==='chord'||role==='sev'){
          const isRoot=role==='root', isSev=role==='sev', C=isSev?V:Y, a=Math.min(1,(isRoot?1:0.78)*gl);
          o.color=isSev?'#ece0ff':(isRoot?'#fff6d6':'#ffe5a3');
          o.borderColor='rgba('+C+','+(isRoot?.95:.7)+')';
          o.background= black ? 'linear-gradient(180deg,#0a0b0e 0%,'+this.mix(C,isRoot?.5:.34)+' 100%)'
            : 'linear-gradient(180deg,rgba('+C+','+(isRoot?.26:.15)+') 0%,#0e1014 '+(isRoot?64:60)+'%)';
          o.boxShadow='inset 0 -38px '+(isRoot?42:34)+'px '+(isRoot?-12:-16)+'px rgba('+C+','+a+'), 0 0 '+Math.round((isRoot?26:16)*gl)+'px -8px rgba('+C+','+a+')';
        } else if(role==='keyroot'){
          o.color='#eafff5'; o.borderColor='rgba('+G+',0.95)';
          o.background= black ? 'linear-gradient(180deg,#08090c 0%,'+this.mix(G,0.5)+' 100%)' : 'linear-gradient(180deg,rgba('+G+',0.42) 0%,#0e1014 64%)';
          o.boxShadow= black ? 'inset 0 -16px 18px -10px rgba('+G+',0.7)' : 'inset 0 -30px 30px -14px rgba('+G+',0.85)';
        } else if(role==='scale'){
          o.color='#cfeede'; o.borderColor='rgba('+G+',.5)';
          o.background= black ? 'linear-gradient(180deg,#08090c 0%,'+this.mix(G,.34)+' 100%)' : 'linear-gradient(180deg,rgba('+G+',.13) 0%,#0e1014 62%)';
          o.boxShadow='inset 0 -26px 30px -18px rgba('+G+','+Math.min(1,.7*gl)+'), 0 0 0 1px rgba('+G+',.12)';
        }
      };
      // voiced offsets (semitones from C of the root's octave), ascending so chords never wrap
      const chordOffsets=pcs=>{ const out=[]; let prev=-1; pcs.forEach((pc,i)=>{ let off=pc; if(i>0){ while(off<=prev) off+=12; } prev=off; out.push(off); }); return out; };
      const chordSpanFor=(deg,dim)=>{
        const pcs=this.chordTones(deg), offs=chordOffsets(pcs), rootOff=offs[0], sevOff=this.isSeventh()?offs[offs.length-1]:-1;
        const set={}; offs.forEach(x=>{ set[x]=1; });
        const span=Math.max(12, Math.ceil((offs[offs.length-1]+1)/12)*12);
        const roleAt=(o,off,pc,black)=>{ if(set[off]){ applyRole(o, off===rootOff?'root':(off===sevOff?'sev':'chord'), black); } else if(!dim && scalePcs.includes(pc)){ applyRole(o,'scale',black); } };
        return { span, roleAt, octaves: span/12 };
      };
      const scaleRoleAt=(o,off,pc,black)=>{ if(pc===S.root){ applyRole(o,'keyroot',black); } else if(scalePcs.includes(pc)){ applyRole(o,'scale',black); } };

      /* responsive keys + a generic span builder so any number of octaves can render */
      const respWhite=H=>({ position:'relative', flex:'1 1 0', minWidth:'0', height:H+'px',
        borderRadius: sharp?'0px':'0 0 5px 5px', display:'flex', alignItems:'flex-end', justifyContent:'center',
        paddingBottom:Math.round(H*0.10)+'px', fontFamily:'var(--font-ui),sans-serif',
        fontSize:Math.max(8,Math.round(H*0.135))+'px', fontWeight:600, letterSpacing:'.3px',
        background:'linear-gradient(180deg,#1b1e23 0%,#0e1014 100%)', border:'1px solid #2a2d34',
        color:'#5b616b', boxShadow:'0 1px 0 #000', userSelect:'none', overflow:'hidden' });
      const respBlack=H=>({ position:'absolute', top:'0', height:Math.round(H*0.62)+'px',
        borderRadius: sharp?'0px':'0 0 4px 4px', display:'flex', alignItems:'flex-end', justifyContent:'center',
        paddingBottom:Math.round(H*0.08)+'px', fontFamily:'var(--font-ui),sans-serif',
        fontSize:Math.max(7,Math.round(H*0.10))+'px', fontWeight:600, color:'#8b929c', zIndex:3,
        background:'linear-gradient(180deg,#08090c 0%,#1a1d22 100%)', border:'1px solid #000', userSelect:'none', overflow:'hidden' });
      // render a keyboard of `span` semitones (from C), coloring each key via roleAt(o,off,pc,black)
      const buildSpan=(span,H,roleAt,interactive)=>{
        const whites=[], blacks=[];
        for(let off=0; off<span; off++){ const pc=off%12; if(isW(pc)) whites.push({off,pc}); else blacks.push({off,pc,pw:whites.length-1}); }
        const wc=whites.length, frac=100/wc, bwp=frac*0.62;
        const wh=whites.map(w=>{ const o=respWhite(H); roleAt(o,w.off,w.pc,false); if(fl(w.pc)) o.filter='brightness(1.7)';
          return '<div '+(interactive?'data-act="key" data-pc="'+w.pc+'" ':'')+'style="'+css(o)+'"><span style="pointer-events:none">'+nm(w.pc)+'</span></div>'; }).join('');
        const bh=blacks.map(b=>{ const o=respBlack(H); o.width=bwp+'%'; o.left=((b.pw+1)*frac - bwp/2)+'%'; roleAt(o,b.off,b.pc,true); if(fl(b.pc)) o.filter='brightness(1.7)';
          return '<div '+(interactive?'data-act="key" data-pc="'+b.pc+'" ':'')+'style="'+css(o)+'"><span style="pointer-events:none">'+nm(b.pc)+'</span></div>'; }).join('');
        return '<div style="position:relative;width:100%;"><div style="display:flex;gap:3px;width:100%;">'+wh+'</div>'+bh+'</div>';
      };
      // a chord on its own ascending keyboard (mini card)
      const miniPiano=(deg,H,active)=>{
        const cs=chordSpanFor(deg,true);
        const body=buildSpan(cs.span,H,cs.roleAt,false);
        const card={ display:'flex', flexDirection:'column', gap:'8px', padding:'10px 10px 12px',
          background:'#0a0b0e', border: active?'1px solid rgba('+Y+',.85)':'1px solid #1a1d22',
          borderRadius:R(12), cursor:'pointer', transition:'all .12s ease',
          boxShadow: active?'0 0 '+Math.round(24*gl)+'px -8px rgba('+Y+','+Math.min(1,.6*gl)+')':'none' };
        const head='<div style="display:flex;align-items:baseline;gap:6px;min-width:0;">'+
          (showNum?'<span style="font-family:var(--font-display),sans-serif;font-size:11px;letter-spacing:1px;color:#6b7079;flex-shrink:0;">'+this.numeral(deg)+'</span>':'')+
          '<span style="font-size:15px;font-weight:600;color:'+cfg.chordColor+';white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+this.chordName(deg)+'</span></div>';
        return '<div data-act="playchord" data-deg="'+deg+'" style="'+css(card)+'">'+head+body+'</div>';
      };
      // main scale/chord keyboard (single & live). chord -> ascending span; else one octave scale.
      const scalePanel=(H)=>{
        let span, roleAt;
        if(chord!=null){ const cs=chordSpanFor(chord,dimScale); span=cs.span; roleAt=cs.roleAt; }
        else { span=12; roleAt=scaleRoleAt; }
        const maxW=Math.round(H*1.95*(span/12));
        const panel={ background:'linear-gradient(180deg,#101218,#0a0b0e)', border:'1px solid #1a1d22', borderRadius:R(18), padding:'16px', boxShadow:'0 24px 60px -24px rgba(0,0,0,.9)', overflow:'hidden' };
        return '<div style="'+css(panel)+'"><div style="width:100%;max-width:'+maxW+'px;margin:0 auto;">'+buildSpan(span,H,roleAt,true)+'</div></div>';
      };

      /* listener panel (visualizer + candidates), shared by Listen and Live views */
      const listenerPanel=()=>{
        const supported = (typeof navigator!=='undefined' && navigator.mediaDevices && navigator.mediaDevices.getUserMedia);
        const viz=this.listenViz();
        const bars=this.NAMES.map((n0,pc)=>{
          const b=viz.bars[pc];
          return '<div style="flex:1 1 0;display:flex;flex-direction:column;align-items:center;gap:7px;min-width:0;">'+
            '<div style="height:'+viz.barH+'px;width:100%;display:flex;align-items:flex-end;">'+
              '<div id="kfbar-'+pc+'" style="width:100%;height:'+b.h+'px;border-radius:4px 4px 0 0;background:'+b.bg+';transition:height .1s ease,background .15s ease;"></div>'+
            '</div>'+
            '<span id="kflbl-'+pc+'" style="font-size:11px;font-weight:600;color:'+b.lc+';">'+this.noteName(pc)+'</span>'+
          '</div>';
        }).join('');
        const cd=this.listenCandData();
        const slots=[0,1,2].map(i=>{
          const c=cd[i], show=!!c, best=show&&i===0;
          const accent= best? cfg.chordColor : '#cfd2d8';
          return '<button type="button" id="kfcand-'+i+'" data-act="applykey" data-root="'+(show?c.root:0)+'" data-scale="'+(show?c.scale:'major')+'" style="flex-direction:column;gap:9px;width:100%;text-align:left;padding:13px 16px;background:#0e1014;border:1px solid '+(best?'rgba('+Y+',.7)':'#23262c')+';border-radius:'+R(12)+';cursor:pointer;transition:all .12s ease;display:'+(show?'flex':'none')+';">'+
            '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;pointer-events:none;">'+
              '<span id="kfcandname-'+i+'" style="font-size:'+(best?'18':'15')+'px;font-weight:600;color:'+accent+';letter-spacing:.3px;">'+(show?c.label:'')+'</span>'+
              '<span id="kfcandtag-'+i+'" style="font-size:10px;color:#6b7079;letter-spacing:1px;text-transform:uppercase;">'+(best?'Best · tap to use':'Tap to use')+'</span>'+
            '</div>'+
            '<div style="height:6px;width:100%;background:#1b1e23;border-radius:3px;overflow:hidden;pointer-events:none;"><div id="kfcandbar-'+i+'" style="height:100%;width:'+(show?c.pct:0)+'%;background:'+(best?'rgba('+Y+',.9)':'rgba('+G+',.6)')+';border-radius:3px;transition:width .15s ease;"></div></div>'+
          '</button>';
        }).join('');
        const candMsg='<div id="kfcandmsg" style="'+(cd.length?'display:none;':'')+'color:#6b717b;font-size:13px;padding:4px 2px;">Start listening and play for a few seconds. The most likely keys will rank here.</div>';
        const startBtn = this.listening
          ? '<button type="button" data-act="listen_stop" style="padding:11px 22px;border:1px solid #2a2d34;background:linear-gradient(180deg,#37201a,#190f0c);color:#ff9d7c;border-radius:'+R(11)+';font-weight:600;letter-spacing:1.5px;font-size:13px;cursor:pointer;">&#9632;&nbsp;&nbsp;STOP</button>'
          : '<button type="button" data-act="listen_start" style="padding:11px 22px;border:1px solid #2a2d34;background:'+(supported?'#16181d':'#1a1113')+';color:'+(supported?'#e7e9ec':'#9a8b8b')+';border-radius:'+R(11)+';font-weight:600;letter-spacing:1.5px;font-size:13px;cursor:pointer;">&#9679;&nbsp;&nbsp;START LISTENING</button>';
        const resetBtn = (this.acc && this.acc.some(x=>x>0)) ? '<button type="button" data-act="listen_reset" style="padding:11px 16px;border:1px solid #23262c;background:transparent;color:#9aa0aa;border-radius:'+R(11)+';font-weight:600;letter-spacing:.5px;font-size:12px;cursor:pointer;">RESET</button>' : '';
        const panel={ background:'linear-gradient(180deg,#101218,#0a0b0e)', border:'1px solid #1a1d22', borderRadius:R(18), padding:'20px', display:'flex', flexDirection:'column', gap:'18px', boxShadow:'0 24px 60px -24px rgba(0,0,0,.9)' };
        return '<div style="'+css(panel)+'">'+
            '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+startBtn+resetBtn+'<div id="kfstatus" style="flex:1 1 150px;min-width:0;">'+this.listenStatusHtml()+'</div></div>'+
            '<div style="display:flex;gap:5px;align-items:flex-end;padding:4px 0 2px;">'+bars+'</div>'+
            '<div style="display:flex;flex-direction:column;gap:9px;">'+
              '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">Likely key</span>'+
              slots+candMsg+
            '</div>'+
          '</div>';
      };

      /* root buttons */
      const rootBtn=pc=>{
        const black=this.BLACK.includes(pc), selected=pc===S.root;
        const o={ flex:'1 1 0', minWidth:'0', height:'54px', display:'flex', flexDirection:'column',
          alignItems:'center', justifyContent:'center', border:'1px solid #23262c',
          background: black?'#070809':'#0e1014', color: black?'#5f656e':'#7c828c',
          fontFamily:'var(--font-ui),sans-serif', fontSize:'14px', fontWeight:600, letterSpacing:'.5px',
          cursor:'pointer', borderRadius:R(11), transition:'all .12s ease', userSelect:'none' };
        if(selected){ o.background='#f3f4f6'; o.color='#0a0b0e'; o.border='1px solid #f3f4f6'; o.boxShadow='0 0 0 3px rgba(255,255,255,.08)'; }
        return o;
      };
      const rootHtml=NAMES.map((n,pc)=>{
        const sub=FLAT[pc]?'<span style="pointer-events:none;font-size:8px;font-weight:500;opacity:.55;line-height:1;margin-top:2px">'+FLAT[pc]+'</span>':'';
        return '<button type="button" data-act="root" data-pc="'+pc+'" style="'+css(rootBtn(pc))+'"><span style="pointer-events:none;line-height:1">'+n+'</span>'+sub+'</button>';
      }).join('');

      /* scale toggle */
      const tgl=active=>({ padding:'9px 24px', borderRadius:R(8), fontFamily:'var(--font-ui),sans-serif', fontSize:'13px',
        fontWeight:600, letterSpacing:'1px', cursor:'pointer', border:'none', transition:'all .12s ease',
        background: active?'#262a31':'transparent', color: active?'#fff':'#7c828c',
        boxShadow: active?'inset 0 0 0 1px #3a3f47':'none' });
      const toggleWrap={ display:'inline-flex', gap:'4px', padding:'4px', background:'#0b0c0f', border:'1px solid #1d2026', borderRadius:R(12) };

      /* readout */
      const scaleLabel=S.scale==='major'?'Major':'Minor';
      let readoutTitle, readoutNotes, titleColor;
      if(chord!=null){
        readoutTitle=this.chordName(chord)+(showNum?'  '+this.numeral(chord):'');
        readoutNotes=tri.map(pc=>nm(pc)).join('   ');
        titleColor=cfg.chordColor;
      } else {
        readoutTitle=nm(S.root)+' '+scaleLabel;
        readoutNotes=scalePcs.map(pc=>nm(pc)).join('   ');
        titleColor=cfg.scaleColor;
      }
      const readoutBox={ display:'flex', alignItems:'baseline', flexWrap:'wrap', gap:'0 2px', minHeight:'30px', padding:'15px 18px', background:'#0a0b0e', border:'1px solid #1a1d22', borderRadius:R(13) };

      /* chord buttons */
      const chordBtn=deg=>{
        const sel=chord===deg;
        const o={ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'3px',
          padding:'13px 4px', border:'1px solid #23262c', background:'#0e1014', color:'#c2c7cf',
          cursor:'pointer', borderRadius:R(13), transition:'all .12s ease', minWidth:'0' };
        if(sel){ o.border='1px solid rgba('+Y+',.8)'; o.background='linear-gradient(180deg,rgba('+Y+',.15),rgba('+Y+',.03))'; o.color=cfg.chordColor; o.boxShadow='0 0 '+Math.round(24*gl)+'px -6px rgba('+Y+','+Math.min(1,.5*gl)+')'; }
        return o;
      };
      const chordHtml=[0,1,2,3,4,5,6].map(deg=>{
        const num=showNum?'<span style="pointer-events:none;font-size:12px;letter-spacing:1px;opacity:.7;font-family:var(--font-display),sans-serif">'+this.numeral(deg)+'</span>':'';
        return '<button type="button" data-act="chord" data-deg="'+deg+'" style="'+css(chordBtn(deg))+'">'+num+'<span style="pointer-events:none;font-size:15px;font-weight:600">'+this.chordName(deg)+'</span></button>';
      }).join('');

      /* progressions */
      const progRow=i=>{
        const sel=S.prog===i;
        return { display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%', gap:'10px',
          padding:'13px 16px', border: sel?'1px solid #33373f':'1px solid #1a1d22',
          background: sel?'#15171c':'#0a0b0e', color: sel?'#fff':'#c2c7cf', cursor:'pointer',
          borderRadius:R(11), fontFamily:'var(--font-ui),sans-serif', fontSize:'14px', fontWeight:600,
          letterSpacing:'.5px', transition:'all .12s ease' };
      };
      const progHtml=this.progs().map((p,i)=>{
        const roman=showNum?'<span style="pointer-events:none;opacity:.6;font-size:13px;font-weight:500;font-family:var(--font-display),sans-serif;letter-spacing:1px">'+p.degrees.map(d=>this.numeral(d)).join(' · ')+'</span>':'';
        return '<button type="button" data-act="prog" data-i="'+i+'" style="'+css(progRow(i))+'"><span style="pointer-events:none">'+p.name+'</span>'+roman+'</button>';
      }).join('');

      let stepsBlock='';
      if(S.prog!=null){
        const stepStyle=active=>{
          const o={ display:'flex', flexDirection:'column', alignItems:'center', gap:'1px', padding:'8px 15px',
            border:'1px solid #23262c', background:'#0e1014', color:'#c2c7cf', cursor:'pointer',
            borderRadius:R(10), transition:'all .12s ease' };
          if(active){ o.border='1px solid rgba('+Y+',.8)'; o.background='linear-gradient(180deg,rgba('+Y+',.16),rgba('+Y+',.03))'; o.color=cfg.chordColor; o.boxShadow='0 0 '+Math.round(20*gl)+'px -7px rgba('+Y+','+Math.min(1,.55*gl)+')'; }
          return o;
        };
        const degs=this.progs()[S.prog].degrees;
        const cur=S.playing&&this._step!=null?((this._step-1+degs.length)%degs.length):-1;
        const stepHtml=degs.map((deg,idx)=>{
          const active=S.playing?idx===cur:chord===deg;
          const num=showNum?'<span style="pointer-events:none;font-size:10px;letter-spacing:.5px;opacity:.65;font-family:var(--font-display),sans-serif">'+this.numeral(deg)+'</span>':'';
          return '<button type="button" data-act="step" data-deg="'+deg+'" style="'+css(stepStyle(active))+'">'+num+'<span style="pointer-events:none;font-size:14px;font-weight:600">'+this.chordName(deg)+'</span></button>';
        }).join('');
        const stepWrap={ display:'flex', alignItems:'center', justifyContent:'space-between', flexWrap:'wrap', gap:'14px', marginTop:'6px', padding:'14px 16px', background:'#0a0b0e', border:'1px solid #1a1d22', borderRadius:R(12) };
        const playStyle={ padding:'11px 22px', border:'1px solid #2a2d34',
          background: S.playing?'linear-gradient(180deg,#37201a,#190f0c)':'#16181d',
          color: S.playing?'#ff9d7c':'#e7e9ec', cursor:'pointer', borderRadius:R(11),
          fontFamily:'var(--font-ui),sans-serif', fontSize:'13px', fontWeight:600, letterSpacing:'1.5px',
          display:'inline-flex', alignItems:'center', gap:'8px', transition:'all .12s ease', whiteSpace:'nowrap' };
        stepsBlock='<div style="'+css(stepWrap)+'"><div style="display:flex;gap:8px;flex-wrap:wrap;">'+stepHtml+'</div>'+
          '<button type="button" data-act="play" style="'+css(playStyle)+'">'+(S.playing?'■  STOP':'▶  PLAY')+'</button></div>';
      }

      /* drawers */
      const drawerHead={ display:'flex', justifyContent:'space-between', alignItems:'center', width:'100%',
        padding:'0 2px 13px', background:'transparent', border:'none', borderBottom:'1px solid #1a1d22',
        color:'#e7e9ec', cursor:'pointer', fontFamily:'var(--font-ui),sans-serif', fontSize:'12px',
        fontWeight:600, letterSpacing:'2.4px', textTransform:'uppercase' };
      const chev=open=>({ transition:'transform .15s ease', transform: open?'rotate(0deg)':'rotate(-90deg)', color:'#5f656e', fontSize:'12px' });

      const d1Body = S.d1 ? '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(66px,1fr));gap:7px;padding-top:14px;">'+chordHtml+'</div>' : '';
      const d2Body = S.d2 ? '<div style="display:flex;flex-direction:column;gap:8px;padding-top:14px;">'+progHtml+stepsBlock+'</div>' : '';

      const listenShortcut =
        '<button type="button" data-act="listen_shortcut" style="display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px;border-radius:'+R(12)+';cursor:pointer;font-family:var(--font-ui),sans-serif;font-size:12px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;'+
          (this.listening
            ? 'border:1px solid #5a2e26;background:linear-gradient(180deg,#37201a,#190f0c);color:#ff9d7c;'
            : 'border:1px solid rgba('+G+',.45);background:#0e1014;color:'+cfg.scaleColor+';')+'">'+
          (this.listening? '&#9632;&nbsp;Stop Listening' : '&#9679;&nbsp;Start Listening')+'</button>';
      const labelCol=
        '<div style="flex:1 1 210px;min-width:188px;max-width:300px;display:flex;flex-direction:column;gap:24px;">'+
          '<div><h1 style="margin:0;font-family:var(--font-display),sans-serif;font-weight:400;letter-spacing:4px;font-size:18px;line-height:1;color:#fff;text-transform:uppercase;">Key Finder</h1>'+
          '<p style="margin:9px 0 0;color:#6b717b;font-size:12.5px;letter-spacing:.3px;line-height:1.45;">Tap keys and chords to hear them. In-key notes glow.</p></div>'+
          listenShortcut+
          '<div style="display:flex;flex-direction:column;gap:0;">'+
            '<button type="button" data-act="d1" style="'+css(drawerHead)+'"><span>Chords in this key</span><span style="'+css(chev(S.d1))+'">▾</span></button>'+d1Body+
          '</div>'+
          '<div style="display:flex;flex-direction:column;gap:0;">'+
            '<button type="button" data-act="d2" style="'+css(drawerHead)+'"><span>Chord progressions</span><span style="'+css(chev(S.d2))+'">▾</span></button>'+d2Body+
          '</div>'+
        '</div>';

      /* view toggle */
      const viewSeg=v=>({ padding:'8px 13px', borderRadius:R(8), fontFamily:'var(--font-ui),sans-serif', fontSize:'12px',
        fontWeight:600, letterSpacing:'.8px', cursor:'pointer', border:'none', transition:'all .12s ease',
        background: S.view===v?'#262a31':'transparent', color: S.view===v?'#fff':'#7c828c',
        boxShadow: S.view===v?'inset 0 0 0 1px #3a3f47':'none', textTransform:'uppercase', whiteSpace:'nowrap' });
      const viewWrap=Object.assign({},toggleWrap,{flexWrap:'wrap'});
      const viewRow=
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">'+
          '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">View</span>'+
          '<div style="'+css(viewWrap)+'">'+
            '<button type="button" data-act="view" data-val="single" style="'+css(viewSeg('single'))+'">Single</button>'+
            '<button type="button" data-act="view" data-val="chords" style="'+css(viewSeg('chords'))+'">Chords</button>'+
            '<button type="button" data-act="view" data-val="progression" style="'+css(viewSeg('progression'))+'">Progression</button>'+
            '<button type="button" data-act="view" data-val="listen" style="'+css(viewSeg('listen'))+'">Listen</button>'+
            '<button type="button" data-act="view" data-val="live" style="'+css(viewSeg('live'))+'">Live</button>'+
          '</div>'+
        '</div>';

      const rootRow=
        '<div style="display:flex;flex-direction:column;gap:11px;">'+
          '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">Root</span>'+
          '<div style="display:flex;gap:6px;">'+rootHtml+'</div>'+
        '</div>';
      const scaleRow=
        '<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;">'+
          '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">Scale</span>'+
          '<div style="'+css(toggleWrap)+'">'+
            '<button type="button" data-act="scale" data-val="major" style="'+css(tgl(S.scale==='major'))+'">Major</button>'+
            '<button type="button" data-act="scale" data-val="minor" style="'+css(tgl(S.scale==='minor'))+'">Minor</button>'+
          '</div>'+
        '</div>';

      let pianoContent;
      if(S.view==='chords'){
        const H=Math.round(88*mz);
        const colMin=Math.round(184*mz);
        const grid=[0,1,2,3,4,5,6].map(d=>miniPiano(d,H,chord===d)).join('');
        pianoContent='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax('+colMin+'px,1fr));gap:'+Math.round(12*mz)+'px;">'+grid+'</div>';
      } else if(S.view==='progression'){
        if(S.prog==null){
          pianoContent='<div style="padding:46px 22px;text-align:center;color:#6b717b;font-size:14px;line-height:1.5;background:#0a0b0e;border:1px solid #1a1d22;border-radius:'+R(14)+';">Open the <b style="color:#9aa0aa">Chord progressions</b> panel and pick one<br>to see every chord laid out on its own keyboard.</div>';
        } else {
          const prog=this.progs()[S.prog], degs=prog.degrees;
          const cur=S.playing&&this._step!=null?((this._step-1+degs.length)%degs.length):-1;
          const H= Math.round((degs.length<=3?124:106)*mz);
          const grid=degs.map((d,idx)=>miniPiano(d,H,S.playing?idx===cur:chord===d)).join('');
          const playStyle2={ padding:'10px 20px', border:'1px solid #2a2d34',
            background: S.playing?'linear-gradient(180deg,#37201a,#190f0c)':'#16181d',
            color: S.playing?'#ff9d7c':'#e7e9ec', cursor:'pointer', borderRadius:R(11),
            fontFamily:'var(--font-ui),sans-serif', fontSize:'13px', fontWeight:600, letterSpacing:'1.5px',
            display:'inline-flex', alignItems:'center', gap:'8px', whiteSpace:'nowrap' };
          const bar='<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">'+
            '<span style="font-size:15px;font-weight:600;color:#e7e9ec;letter-spacing:.5px;">'+prog.name+
              '<span style="color:#5f656e;margin-left:10px;font-family:var(--font-display),sans-serif;letter-spacing:1px;font-size:13px;">'+degs.map(d=>this.numeral(d)).join(' · ')+'</span></span>'+
            '<button type="button" data-act="play" style="'+css(playStyle2)+'">'+(S.playing?'■  STOP':'▶  PLAY')+'</button>'+
          '</div>';
          const cols = degs.length<=2?'repeat('+degs.length+',minmax(0,1fr))':'repeat(auto-fit,minmax('+Math.round(208*mz)+'px,1fr))';
          pianoContent=bar+'<div style="display:grid;grid-template-columns:'+cols+';gap:'+Math.round(12*mz)+'px;">'+grid+'</div>';
        }
      } else if(S.view==='listen'){
        pianoContent=
          listenerPanel()+
          '<span style="display:block;margin-top:14px;font-size:11.5px;color:#565c6b;line-height:1.45;">Best guess from a live room is approximate. A clean source reads best. Tap a key to load it into the piano. Try the Live view to keep the piano and chords visible while it listens.</span>';
      } else {
        pianoContent=
          scalePanel(Math.round(120*k))+
          '<div style="'+css(readoutBox)+'">'+
            '<span style="color:'+titleColor+';font-size:18px;font-weight:600;letter-spacing:.5px;font-family:var(--font-display),sans-serif;">'+readoutTitle+'</span>'+
            '<span style="color:#3a3e45;margin:0 12px;font-size:15px;">·</span>'+
            '<span style="color:#9aa0aa;font-size:15px;letter-spacing:3px;font-weight:500;">'+readoutNotes+'</span>'+
          '</div>';
      }

      const pianoCol=
        '<div style="flex:2 1 460px;min-width:400px;display:flex;flex-direction:column;gap:22px;">'+
          rootRow + scaleRow + viewRow + pianoContent +
        '</div>';

      const wrapMax = S.sideOpen ? '1180px' : 'none';
      if(S.view==='live'){
        const liveReadout='<div style="'+css(readoutBox)+'">'+
            '<span style="color:'+titleColor+';font-size:18px;font-weight:600;letter-spacing:.5px;font-family:var(--font-display),sans-serif;">'+readoutTitle+'</span>'+
            '<span style="color:#3a3e45;margin:0 12px;font-size:15px;">·</span>'+
            '<span style="color:#9aa0aa;font-size:15px;letter-spacing:3px;font-weight:500;">'+readoutNotes+'</span>'+
          '</div>';
        const leftPane='<div style="flex:1 1 290px;min-width:260px;max-width:380px;display:flex;flex-direction:column;gap:12px;">'+
            '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">Listening</span>'+
            listenerPanel()+
          '</div>';
        // right-pane display toggle: keyboard vs all chords
        const lrSeg=v=>({ padding:'7px 14px', borderRadius:R(8), fontFamily:'var(--font-ui),sans-serif', fontSize:'12px',
          fontWeight:600, letterSpacing:'.8px', cursor:'pointer', border:'none', transition:'all .12s ease',
          background: S.liveRight===v?'#262a31':'transparent', color: S.liveRight===v?'#fff':'#7c828c',
          boxShadow: S.liveRight===v?'inset 0 0 0 1px #3a3f47':'none', textTransform:'uppercase', whiteSpace:'nowrap' });
        const lrToggle='<div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;">'+
            '<span style="font-size:11px;letter-spacing:2.4px;color:#5f656e;text-transform:uppercase;">Display</span>'+
            '<div style="'+css(toggleWrap)+'">'+
              '<button type="button" data-act="liveright" data-val="keys" style="'+css(lrSeg('keys'))+'">Keyboard</button>'+
              '<button type="button" data-act="liveright" data-val="chords" style="'+css(lrSeg('chords'))+'">Chords</button>'+
            '</div>'+
          '</div>';
        let rightDisplay;
        if(S.liveRight==='chords'){
          const H=Math.round(96*this.P('liveSize',1));
          const grid=[0,1,2,3,4,5,6].map(d=>miniPiano(d,H,chord===d)).join('');
          rightDisplay='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax('+Math.round(186*this.P('liveSize',1))+'px,1fr));gap:12px;">'+grid+'</div>';
        } else {
          rightDisplay=scalePanel(Math.round(150*this.P('liveSize',1)))+liveReadout;
        }
        const rightPane='<div style="flex:2 1 430px;min-width:320px;display:flex;flex-direction:column;gap:16px;">'+
            rootRow+scaleRow+lrToggle+rightDisplay+
          '</div>';
        this.mainEl.innerHTML='<div style="display:flex;flex-direction:column;gap:18px;max-width:'+wrapMax+';margin:0;">'+viewRow+'<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;">'+leftPane+rightPane+'</div></div>';
        return;
      }
      this.mainEl.innerHTML='<div style="display:flex;gap:28px;align-items:flex-start;flex-wrap:wrap;max-width:'+wrapMax+';margin:0;">'+labelCol+pianoCol+'</div>';
    }
  }

  new App();
})();
</script>
<script>
  /* PWA: register service worker for offline + installability (no-op outside https) */
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('sw.js').catch(function(){});
    });
  }
</script>
</body>
</html>
